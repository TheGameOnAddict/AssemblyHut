<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#111827">
  <title>Mobile CAD</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main id="app">
    <canvas id="viewport"></canvas>

    <header class="topbar">
      <div>
        <strong>Mobile CAD</strong>
        <span id="status">Cube 1 selected</span>
      </div>
      <button id="resetView" class="icon-button">Reset View</button>
    </header>

    <aside id="inspector" class="inspector">
      <div class="inspector-title">
        <span id="selectedName">Cube 1</span>
        <button id="closeInspector" aria-label="Close inspector">×</button>
      </div>
      <div class="coords" id="coords">
        <span>X <b id="xPos">0.00</b></span>
        <span>Y <b id="yPos">0.50</b></span>
        <span>Z <b id="zPos">0.00</b></span>
      </div>
    </aside>

    <section class="bottom-sheet">
      <div class="tool-row add-row">
        <button data-add="cube">Cube</button>
        <button data-add="cylinder">Cylinder</button>
        <button data-add="cone">Cone</button>
        <button data-add="sphere">Sphere</button>
      </div>

      <div class="tool-row action-row">
        <button class="mode active" data-mode="translate">Move</button>
        <button class="mode" data-mode="rotate">Rotate</button>
        <button class="mode" data-mode="scale">Scale</button>
        <button id="duplicate">Duplicate</button>
        <button id="delete" class="danger">Delete</button>
      </div>
    </section>

    <div id="toast" class="toast"></div>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
