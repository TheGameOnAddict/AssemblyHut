<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#f3f4f6">
  <title>Mobile CAD v0.9</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3f4f6;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
    body{touch-action:none;overscroll-behavior:none}
    #viewport{display:block;width:100%;height:100%;touch-action:none}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;background:linear-gradient(#f8fafcee,#f8fafcaa,transparent);pointer-events:none}
    .topbar .title{display:flex;flex-direction:column}.topbar strong{color:#111827;font-size:18px}.topbar span{color:#475569;font-size:12px}
    button{border:0;border-radius:12px;min-height:46px;padding:0 12px;background:#e2e8f0;color:#111827;font-weight:700;font-size:13px}
    button:active{transform:scale(.97)}
    button.active{background:#2563eb;color:#ffffff;box-shadow:0 0 0 2px #2563eb44}
    button.danger{background:#fee2e2;color:#991b1b}
    #resetView{pointer-events:auto;min-height:38px}
    .panel{position:fixed;top:calc(env(safe-area-inset-top) + 72px);left:12px;z-index:10;width:220px;padding:12px;border-radius:16px;background:#101827e8;color:#111827;border:1px solid #cbd5e1;backdrop-filter:blur(14px)}
    .panel-title{font-weight:800;margin-bottom:8px}.coords{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .coords div{background:#f1f5f9;border-radius:9px;padding:8px;text-align:center;color:#64748b;font-size:11px}
    .coords b{display:block;color:#111827;font-size:13px;margin-top:2px}
    .bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:10px 10px calc(env(safe-area-inset-bottom) + 10px);background:#f3f4f6f2;border-top:1px solid #cbd5e1;backdrop-filter:blur(16px)}
    .row{display:grid;gap:8px}.add{grid-template-columns:repeat(4,1fr);margin-bottom:8px}.actions{grid-template-columns:repeat(5,minmax(68px,1fr));overflow-x:auto}
    #error{display:none;position:fixed;inset:20% 18px auto;z-index:50;padding:18px;border-radius:16px;background:#451a1a;color:#fee2e2;border:1px solid #ef444455;white-space:pre-wrap}
    #toast{position:fixed;left:50%;bottom:155px;z-index:20;transform:translateX(-50%) translateY(8px);padding:9px 14px;border-radius:999px;background:#0f172a;color:#111827;border:1px solid #cbd5e1;opacity:0;transition:.2s;pointer-events:none;font-size:13px}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .selection-tools{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .selection-tools button{min-height:38px;font-size:12px}
    .selection-tools button.active{background:#2563eb;color:white}
    .selection-count{margin-top:8px;font-size:12px;color:#64748b}
    .parts-panel{position:fixed;top:calc(env(safe-area-inset-top) + 72px);right:12px;z-index:10;width:min(280px,42vw);max-height:48vh;padding:12px;border-radius:16px;background:#fffffff0;color:#111827;border:1px solid #cbd5e1;backdrop-filter:blur(14px);overflow:hidden}
    .parts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .parts-header button{min-height:32px;padding:0 10px;font-size:12px}
    .parts-list{display:flex;flex-direction:column;gap:8px;overflow:auto;max-height:calc(48vh - 55px)}
    .part-card{background:#f1f5f9;border:1px solid #dbe3ec;border-radius:12px;padding:10px}
    .part-card-name{font-weight:800;font-size:13px;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .part-card-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .part-card-actions button{min-height:34px;font-size:11px;padding:0 8px}
    .library-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
    .library-tab{min-height:34px;font-size:11px}
    .library-tab.active{background:#2563eb;color:#fff}
    .hidden{display:none!important}
    .data-status{font-size:10px;color:#64748b;margin-top:8px;line-height:1.3}
    .definition-meta{font-size:10px;color:#64748b;margin-bottom:7px}
    .parts-panel.collapsed .parts-list,.parts-panel.collapsed .library-tabs,.parts-panel.collapsed .data-status{display:none}
    .parts-panel.collapsed{width:auto}
    @media(max-width:700px){
      .panel{width:200px}
      .parts-panel{top:auto;bottom:calc(env(safe-area-inset-bottom) + 148px);right:10px;width:230px;max-height:34vh}
      .parts-list{max-height:calc(34vh - 50px)}
    }

  </style>

  <script>
    // Remove any older service worker/cache from previous versions.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
    if ("caches" in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  </script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="viewport"></canvas>

  <div class="topbar">
    <div class="title">
      <strong>Mobile CAD</strong>
      <span id="status">Loading scene…</span>
    </div>
    <button id="resetView">Reset View</button>
  </div>

  <div class="panel">
    <div class="panel-title" id="selectedName">Nothing selected</div>
    <div class="coords">
      <div>X<b id="x">—</b></div>
      <div>Y<b id="y">—</b></div>
      <div>Z<b id="z">—</b></div>
    </div>
    <div class="selection-tools">
      <button id="multiSelect">Multi Select</button>
      <button id="createPart">Create Part</button>
    </div>
    <div class="selection-count" id="selectionCount">0 objects selected</div>
  </div>

  <div class="parts-panel">
    <div class="parts-header">
      <strong>Library</strong>
      <button id="toggleParts">Hide</button>
    </div>
    <div class="library-tabs">
      <button class="library-tab active" data-library-tab="parts">Parts</button>
      <button class="library-tab" data-library-tab="assemblies">Assemblies</button>
    </div>
    <div id="partsList" class="parts-list"></div>
    <div id="assembliesList" class="parts-list hidden"></div>
    <div class="data-status" id="dataStatus">Opening local database…</div>
  </div>

  <div class="bottom">
    <div class="row add">
      <button data-add="cube">Cube</button>
      <button data-add="cylinder">Cylinder</button>
      <button data-add="cone">Cone</button>
      <button data-add="sphere">Sphere</button>
    </div>
    <div class="row actions">
      <button class="mode active" data-mode="translate">Move</button>
      <button class="mode" data-mode="rotate">Rotate</button>
      <button class="mode" data-mode="scale">Scale</button>
      <button id="duplicate">Duplicate</button>
      <button id="delete" class="danger">Delete</button>
    </div>
  </div>

  <div id="toast"></div>
  <div id="error"></div>

  <script type="module">
    const errorBox = document.getElementById("error");

    try {
      const THREE = await import("three");
      const { OrbitControls } = await import("three/addons/controls/OrbitControls.js");
      const { TransformControls } = await import("three/addons/controls/TransformControls.js");

      const canvas = document.getElementById("viewport");
      const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
      renderer.setPixelRatio(Math.min(devicePixelRatio,2));
      renderer.shadowMap.enabled = true;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf3f4f6);

      const camera = new THREE.PerspectiveCamera(50,1,.1,200);
      camera.position.set(5.5,4.5,6.5);

      const orbit = new OrbitControls(camera,renderer.domElement);
      orbit.enableDamping = true;
      orbit.target.set(0,.6,0);

      scene.add(new THREE.HemisphereLight(0xffffff,0x94a3b8,2.8));
      const light = new THREE.DirectionalLight(0xffffff,2.4);
      light.position.set(4,8,5);
      light.castShadow = true;
      scene.add(light);

      scene.add(new THREE.GridHelper(30,30,0x94a3b8,0xd1d5db));
      const axes = new THREE.AxesHelper(2);
      axes.position.y=.01;
      scene.add(axes);

      const transform = new TransformControls(camera,renderer.domElement);
      transform.setSize(.85);
      scene.add(transform);
      transform.addEventListener("dragging-changed",e=>orbit.enabled=!e.value);
      transform.addEventListener("objectChange",updateInspector);

      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      const objects = [];
      const colors=[0x4f9cf9,0x22c55e,0xf59e0b,0xa78bfa,0xec4899,0x14b8a6];
      const DB_NAME = "AssemblyHutDB";
      const DB_VERSION = 1;
      const DEFINITIONS_STORE = "definitions";
      const PROJECTS_STORE = "projects";
      const LEGACY_STORAGE_KEY = "assemblyhut_parts_v1";

      let db=null;
      let selected=null, counter=0, pointerStart=null;
      let multiSelectMode=false;
      let selectedObjects=[];
      let definitions=[];
      let currentLibraryTab="parts";

      function geometry(type){
        if(type==="cylinder") return new THREE.CylinderGeometry(.55,.55,1.2,40);
        if(type==="cone") return new THREE.ConeGeometry(.62,1.3,40);
        if(type==="sphere") return new THREE.SphereGeometry(.62,36,24);
        return new THREE.BoxGeometry(1,1,1);
      }
      function label(type){return type[0].toUpperCase()+type.slice(1)}
      function makeMesh(type,colorIndex=counter){
        const mesh=new THREE.Mesh(
          geometry(type),
          new THREE.MeshStandardMaterial({color:colors[colorIndex%colors.length],roughness:.58,metalness:.08})
        );
        mesh.userData.type=type;
        mesh.castShadow=true;
        mesh.receiveShadow=true;
        return mesh;
      }

      function add(type,position){
        counter++;
        const mesh=makeMesh(type,counter-1);
        mesh.name=`${label(type)} ${counter}`;
        mesh.position.copy(position || new THREE.Vector3((objects.length%4)*.35,type==="sphere"?.62:.5,0));
        scene.add(mesh);
        objects.push(mesh);
        clearMultiSelection();
        select(mesh);
        toast(`${mesh.name} added`);
      }
      function setHighlight(obj,on){
        obj.traverse(child=>{
          if(child.isMesh && child.material?.emissive){
            child.material.emissive.setHex(on?0x10233f:0x000000);
          }
        });
      }

      function select(obj){
        if(selected) setHighlight(selected,false);
        selected=obj;
        if(!obj){
          transform.detach();
          document.getElementById("selectedName").textContent="Nothing selected";
          document.getElementById("status").textContent="Nothing selected";
          ["x","y","z"].forEach(id=>document.getElementById(id).textContent="—");
          return;
        }
        setHighlight(obj,true);
        transform.attach(obj);
        updateInspector();
      }

      function toggleMultiObject(obj){
        const index=selectedObjects.indexOf(obj);
        if(index>=0){
          selectedObjects.splice(index,1);
          setHighlight(obj,false);
        }else{
          selectedObjects.push(obj);
          setHighlight(obj,true);
        }
        selected=null;
        transform.detach();
        updateSelectionCount();
      }

      function clearMultiSelection(){
        selectedObjects.forEach(obj=>setHighlight(obj,false));
        selectedObjects=[];
        updateSelectionCount();
      }

      function updateSelectionCount(){
        document.getElementById("selectionCount").textContent=`${selectedObjects.length} object${selectedObjects.length===1?"":"s"} selected`;
      }
      function updateInspector(){
        if(!selected)return;
        document.getElementById("selectedName").textContent=selected.name;
        document.getElementById("status").textContent=`${selected.name} selected`;
        document.getElementById("x").textContent=selected.position.x.toFixed(2);
        document.getElementById("y").textContent=selected.position.y.toFixed(2);
        document.getElementById("z").textContent=selected.position.z.toFixed(2);
      }
      function setMode(mode){
        transform.setMode(mode);
        document.querySelectorAll(".mode").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
        toast(label(mode));
      }
      function duplicate(){
        if(!selected)return toast("Select an object first");
        counter++;
        const clone=selected.clone(true);
        clone.traverse(child=>{
          if(child.isMesh && child.material) child.material=child.material.clone();
        });
        clone.name=selected.userData?.isDefinitionInstance ? `${selected.name} copy` : `${label(selected.userData.type)} ${counter}`;
        if(clone.userData?.isDefinitionInstance)clone.userData.instanceId=makeId("instance");
        clone.position.x+=.7;
        clone.position.z+=.4;
        scene.add(clone);
        objects.push(clone);
        select(clone);
      }
      function removeSelected(){
        if(!selected)return toast("Select an object first");
        const doomed=selected;
        select(null);
        objects.splice(objects.indexOf(doomed),1);
        scene.remove(doomed);
        doomed.traverse(child=>{
          if(child.isMesh){
            child.geometry?.dispose();
            child.material?.dispose();
          }
        });
      }
      function rootSelectable(obj){
        let current=obj;
        while(current.parent && current.parent!==scene){
          if(current.parent.userData?.isDefinitionInstance) return current.parent;
          current=current.parent;
        }
        return current;
      }

      function pick(x,y){
        const rect=renderer.domElement.getBoundingClientRect();
        pointer.x=((x-rect.left)/rect.width)*2-1;
        pointer.y=-((y-rect.top)/rect.height)*2+1;
        raycaster.setFromCamera(pointer,camera);
        const hit=raycaster.intersectObjects(objects,true)[0];
        if(!hit)return;
        const target=rootSelectable(hit.object);
        if(multiSelectMode && !target.userData?.isDefinitionInstance){
          toggleMultiObject(target);
        }else{
          clearMultiSelection();
          select(target);
        }
      }


      function makeId(prefix){
        return crypto.randomUUID ? `${prefix}-${crypto.randomUUID()}` : `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function openDatabase(){
        return new Promise((resolve,reject)=>{
          const request=indexedDB.open(DB_NAME,DB_VERSION);
          request.onupgradeneeded=()=>{
            const database=request.result;
            if(!database.objectStoreNames.contains(DEFINITIONS_STORE)){
              const store=database.createObjectStore(DEFINITIONS_STORE,{keyPath:"id"});
              store.createIndex("type","type",{unique:false});
              store.createIndex("name","name",{unique:false});
            }
            if(!database.objectStoreNames.contains(PROJECTS_STORE)){
              database.createObjectStore(PROJECTS_STORE,{keyPath:"id"});
            }
          };
          request.onsuccess=()=>{
            db=request.result;
            db.onversionchange=()=>db.close();
            resolve(db);
          };
          request.onerror=()=>reject(request.error);
        });
      }

      function dbRequest(storeName,mode,operation){
        return new Promise((resolve,reject)=>{
          const transaction=db.transaction(storeName,mode);
          const store=transaction.objectStore(storeName);
          const request=operation(store);
          request.onsuccess=()=>resolve(request.result);
          request.onerror=()=>reject(request.error);
        });
      }

      async function getAllDefinitions(){
        return dbRequest(DEFINITIONS_STORE,"readonly",store=>store.getAll());
      }

      async function getDefinition(id){
        return dbRequest(DEFINITIONS_STORE,"readonly",store=>store.get(id));
      }

      async function putDefinition(definition){
        definition.updatedAt=new Date().toISOString();
        if(!definition.createdAt)definition.createdAt=definition.updatedAt;
        await dbRequest(DEFINITIONS_STORE,"readwrite",store=>store.put(definition));
      }

      async function removeDefinition(id){
        await dbRequest(DEFINITIONS_STORE,"readwrite",store=>store.delete(id));
      }

      async function migrateLegacyParts(){
        const raw=localStorage.getItem(LEGACY_STORAGE_KEY);
        if(!raw)return 0;
        let legacy=[];
        try{legacy=JSON.parse(raw)||[]}catch{return 0}
        if(!Array.isArray(legacy)||legacy.length===0)return 0;

        let migrated=0;
        for(const oldPart of legacy){
          if(definitions.some(def=>def.legacyId===oldPart.id))continue;
          const definition={
            id:makeId("part"),
            legacyId:oldPart.id,
            type:"part",
            name:oldPart.name || `Migrated Part ${migrated+1}`,
            version:1,
            children:(oldPart.primitives||[]).map((primitive,index)=>({
              id:makeId("primitive"),
              nodeType:"primitive",
              primitiveType:primitive.type || "cube",
              name:`${label(primitive.type || "cube")} ${index+1}`,
              transform:{
                position:primitive.position || [0,0,0],
                rotation:primitive.rotation || [0,0,0],
                scale:primitive.scale || [1,1,1]
              },
              appearance:{color:primitive.color ?? 0x4f9cf9}
            }))
          };
          await putDefinition(definition);
          definitions.push(definition);
          migrated++;
        }
        if(migrated>0)localStorage.setItem(`${LEGACY_STORAGE_KEY}_migrated`,"true");
        return migrated;
      }

      async function initializeData(){
        const status=document.getElementById("dataStatus");
        try{
          await openDatabase();
          definitions=await getAllDefinitions();
          const migrated=await migrateLegacyParts();
          if(migrated>0)definitions=await getAllDefinitions();
          status.textContent=`IndexedDB ready · ${definitions.length} definition${definitions.length===1?"":"s"}`;
          renderLibrary();
          if(migrated>0)toast(`${migrated} saved part${migrated===1?"":"s"} migrated`);
        }catch(error){
          console.error(error);
          status.textContent="Database failed — changes will not persist";
          toast("Local database failed");
        }
      }

      function primitiveNodeFromObject(obj,center,index){
        return {
          id:makeId("primitive"),
          nodeType:"primitive",
          primitiveType:obj.userData.type || "cube",
          name:obj.name || `Primitive ${index+1}`,
          transform:{
            position:[obj.position.x-center.x,obj.position.y-center.y,obj.position.z-center.z],
            rotation:[obj.rotation.x,obj.rotation.y,obj.rotation.z],
            scale:[obj.scale.x,obj.scale.y,obj.scale.z]
          },
          appearance:{color:obj.material?.color?.getHex?.() ?? 0x4f9cf9}
        };
      }

      async function createPartFromSelection(){
        if(selectedObjects.length<1)return toast("Select one or more primitives");
        if(selectedObjects.some(obj=>obj.userData?.isDefinitionInstance)){
          return toast("Parts must be made from primitives");
        }

        const name=prompt("Part name:",`Part ${definitions.filter(d=>d.type==="part").length+1}`);
        if(!name)return;

        const center=new THREE.Vector3();
        selectedObjects.forEach(obj=>center.add(obj.position));
        center.multiplyScalar(1/selectedObjects.length);

        const definition={
          id:makeId("part"),
          type:"part",
          name:name.trim(),
          version:1,
          children:selectedObjects.map((obj,index)=>primitiveNodeFromObject(obj,center,index)),
          metadata:{source:"AssemblyHut",childCount:selectedObjects.length}
        };

        await putDefinition(definition);
        definitions.push(definition);
        renderLibrary();
        clearMultiSelection();
        multiSelectMode=false;
        document.getElementById("multiSelect").classList.remove("active");
        document.getElementById("dataStatus").textContent=`IndexedDB ready · ${definitions.length} definitions`;
        toast(`${definition.name} saved locally`);
      }

      function applyNodeTransform(object,data){
        const value=data||{};
        object.position.fromArray(value.position||[0,0,0]);
        const rotation=value.rotation||[0,0,0];
        object.rotation.set(rotation[0],rotation[1],rotation[2]);
        object.scale.fromArray(value.scale||[1,1,1]);
      }

      async function buildDefinitionObject(definition,instanceId=null){
        const group=new THREE.Group();
        group.name=definition.name;
        group.userData.isDefinitionInstance=true;
        group.userData.definitionId=definition.id;
        group.userData.definitionType=definition.type;
        group.userData.instanceId=instanceId||makeId("instance");

        for(let index=0;index<(definition.children||[]).length;index++){
          const child=definition.children[index];
          if(child.nodeType==="primitive"){
            const mesh=makeMesh(child.primitiveType,index);
            mesh.name=child.name||`${label(child.primitiveType)} ${index+1}`;
            mesh.userData.nodeId=child.id;
            mesh.material.color.setHex(child.appearance?.color ?? colors[index%colors.length]);
            applyNodeTransform(mesh,child.transform);
            group.add(mesh);
          }else if(child.nodeType==="instance"){
            const childDefinition=definitions.find(def=>def.id===child.definitionId)||await getDefinition(child.definitionId);
            if(!childDefinition)continue;
            const nested=await buildDefinitionObject(childDefinition,child.id);
            applyNodeTransform(nested,child.transform);
            nested.userData.explode={
              direction:child.explode?.direction||[0,0,0],
              distance:child.explode?.distance||0
            };
            group.add(nested);
          }
        }
        return group;
      }

      async function insertDefinition(definitionId){
        const definition=definitions.find(def=>def.id===definitionId)||await getDefinition(definitionId);
        if(!definition)return toast("Definition not found");
        const group=await buildDefinitionObject(definition);
        group.position.set(0,0.5,0);
        scene.add(group);
        objects.push(group);
        clearMultiSelection();
        select(group);
        toast(`${definition.name} inserted`);
      }

      async function deleteDefinition(definitionId){
        const definition=definitions.find(def=>def.id===definitionId);
        if(!definition)return;
        if(!confirm(`Delete saved ${definition.type} "${definition.name}"?`))return;

        const usedBy=definitions.filter(def=>
          def.type==="assembly" &&
          (def.children||[]).some(child=>child.nodeType==="instance"&&child.definitionId===definitionId)
        );
        if(usedBy.length>0)return toast(`Used by ${usedBy[0].name}`);

        await removeDefinition(definitionId);
        definitions=definitions.filter(def=>def.id!==definitionId);
        renderLibrary();
        document.getElementById("dataStatus").textContent=`IndexedDB ready · ${definitions.length} definitions`;
      }

      function renderLibrary(){
        renderDefinitionList("partsList","part");
        renderDefinitionList("assembliesList","assembly");
        showLibraryTab(currentLibraryTab);
      }

      function renderDefinitionList(containerId,type){
        const list=document.getElementById(containerId);
        list.innerHTML="";
        const matches=definitions.filter(def=>def.type===type).sort((a,b)=>a.name.localeCompare(b.name));

        if(matches.length===0){
          const empty=document.createElement("div");
          empty.className="selection-count";
          empty.textContent=type==="part"?"No saved parts yet":"Assemblies begin in v0.10";
          list.appendChild(empty);
          return;
        }

        matches.forEach(definition=>{
          const childCount=(definition.children||[]).length;
          const card=document.createElement("div");
          card.className="part-card";
          card.innerHTML=`
            <div class="part-card-name">${escapeHtml(definition.name)}</div>
            <div class="definition-meta">${childCount} child${childCount===1?"":"ren"} · ${definition.type}</div>
            <div class="part-card-actions">
              <button data-insert-definition="${definition.id}">Insert</button>
              <button class="danger" data-delete-definition="${definition.id}">Delete</button>
            </div>`;
          list.appendChild(card);
        });

        list.querySelectorAll("[data-insert-definition]").forEach(button=>{
          button.onclick=()=>insertDefinition(button.dataset.insertDefinition);
        });
        list.querySelectorAll("[data-delete-definition]").forEach(button=>{
          button.onclick=()=>deleteDefinition(button.dataset.deleteDefinition);
        });
      }

      function showLibraryTab(tab){
        currentLibraryTab=tab;
        document.getElementById("partsList").classList.toggle("hidden",tab!=="parts");
        document.getElementById("assembliesList").classList.toggle("hidden",tab!=="assemblies");
        document.querySelectorAll(".library-tab").forEach(button=>{
          button.classList.toggle("active",button.dataset.libraryTab===tab);
        });
      }

      function escapeHtml(value){
        return String(value).replace(/[&<>"']/g,ch=>({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[ch]));
      }

      function toast(message){
        const el=document.getElementById("toast");
        el.textContent=message;
        el.classList.add("show");
        clearTimeout(toast.timer);
        toast.timer=setTimeout(()=>el.classList.remove("show"),1100);
      }
      function resize(){
        const w=innerWidth,h=innerHeight;
        renderer.setSize(w,h,false);
        camera.aspect=w/h;
        camera.updateProjectionMatrix();
      }

      renderer.domElement.addEventListener("pointerdown",e=>pointerStart={x:e.clientX,y:e.clientY});
      renderer.domElement.addEventListener("pointerup",e=>{
        if(!pointerStart||transform.dragging)return;
        const d=Math.hypot(e.clientX-pointerStart.x,e.clientY-pointerStart.y);
        pointerStart=null;
        if(d<7)pick(e.clientX,e.clientY);
      });

      document.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>add(b.dataset.add));
      document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
      document.getElementById("duplicate").onclick=duplicate;
      document.getElementById("delete").onclick=removeSelected;
      document.getElementById("multiSelect").onclick=()=>{
        multiSelectMode=!multiSelectMode;
        document.getElementById("multiSelect").classList.toggle("active",multiSelectMode);
        if(multiSelectMode){
          select(null);
          toast("Tap primitives to select");
        }else{
          clearMultiSelection();
        }
      };
      document.getElementById("createPart").onclick=()=>createPartFromSelection().catch(console.error);
      document.querySelectorAll(".library-tab").forEach(button=>{
        button.onclick=()=>showLibraryTab(button.dataset.libraryTab);
      });
      document.getElementById("toggleParts").onclick=()=>{
        const panel=document.querySelector(".parts-panel");
        panel.classList.toggle("collapsed");
        document.getElementById("toggleParts").textContent=panel.classList.contains("collapsed")?"Show":"Hide";
      };
      document.getElementById("resetView").onclick=()=>{
        camera.position.set(5.5,4.5,6.5);
        orbit.target.set(0,.6,0);
        orbit.update();
      };

      addEventListener("resize",resize);
      resize();
      add("cube",new THREE.Vector3(0,.5,0));
      setMode("translate");
      updateSelectionCount();
      initializeData();

      function animate(){
        requestAnimationFrame(animate);
        orbit.update();
        renderer.render(scene,camera);
      }
      animate();
    } catch (err) {
      errorBox.style.display = "block";
      errorBox.textContent = "The 3D scene failed to load.\n\n" + err.message;
      document.getElementById("status").textContent = "Scene failed to load";
      console.error(err);
    }
  </script>
</body>
</html>
